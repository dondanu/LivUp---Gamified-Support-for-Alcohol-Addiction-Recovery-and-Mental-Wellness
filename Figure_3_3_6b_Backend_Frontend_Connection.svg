<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Figure 3.3.6b: Live Data Flow - React Native Frontend ↔ Backend API
  </text>
  
  <!-- Frontend Section -->
  <g id="frontend">
    <!-- Frontend Container -->
    <rect x="50" y="80" width="300" height="450" rx="15" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
    <text x="200" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
      React Native Frontend
    </text>
    
    <!-- Mobile Device Frame -->
    <rect x="80" y="130" width="240" height="380" rx="20" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
    <rect x="90" y="150" width="220" height="340" rx="10" fill="white"/>
    
    <!-- App Screen Content -->
    <rect x="100" y="160" width="200" height="40" rx="5" fill="#6C5CE7"/>
    <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Mind Fusion App
    </text>
    
    <!-- Dashboard Elements -->
    <rect x="110" y="220" width="180" height="30" rx="5" fill="#00B894"/>
    <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">
      Dashboard - Live Data
    </text>
    
    <rect x="110" y="260" width="85" height="60" rx="5" fill="#FDCB6E"/>
    <text x="152" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">
      Drink Stats
    </text>
    <text x="152" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">
      Sober Days: 15
    </text>
    <text x="152" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">
      Streak: 7
    </text>
    
    <rect x="205" y="260" width="85" height="60" rx="5" fill="#E17055"/>
    <text x="247" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Mood Track
    </text>
    <text x="247" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Today: Happy
    </text>
    <text x="247" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Score: 8/10
    </text>
    
    <rect x="110" y="330" width="180" height="30" rx="5" fill="#A29BFE"/>
    <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">
      Progress & Achievements
    </text>
    
    <rect x="110" y="370" width="180" height="30" rx="5" fill="#FD79A8"/>
    <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">
      Tasks & Challenges
    </text>
    
    <!-- API Config -->
    <rect x="110" y="420" width="180" height="50" rx="5" fill="#2D3436"/>
    <text x="200" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00B894">
      API Config
    </text>
    <text x="200" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#74B9FF">
      http://10.225.86.63:3000/api
    </text>
  </g>
  
  <!-- Connection Arrow -->
  <g id="connection">
    <!-- HTTP Requests Arrow -->
    <path d="M 360 200 Q 400 180 440 200" stroke="#E74C3C" stroke-width="3" fill="none" marker-end="url(#arrowhead-red)"/>
    <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C">
      HTTP Requests
    </text>
    <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">
      (POST, GET, PUT, DELETE)
    </text>
    
    <!-- JSON Response Arrow -->
    <path d="M 440 320 Q 400 340 360 320" stroke="#00B894" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/>
    <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#00B894">
      JSON Responses
    </text>
    <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00B894">
      (Real-time Data)
    </text>
  </g>
  
  <!-- Backend Section -->
  <g id="backend">
    <!-- Backend Container -->
    <rect x="450" y="80" width="300" height="450" rx="15" fill="#00B894" stroke="#00A085" stroke-width="2"/>
    <text x="600" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
      Node.js Backend API
    </text>
    
    <!-- Server Status -->
    <rect x="470" y="130" width="260" height="80" rx="10" fill="white"/>
    <circle cx="520" cy="155" r="15" fill="#00B894"/>
    <text x="535" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
      Mind Fusion API
    </text>
    <text x="535" y="165" font-family="Arial, sans-serif" font-size="12" fill="#00B894">
      ✓ Backend Successfully Working!
    </text>
    <text x="480" y="185" font-family="Arial, sans-serif" font-size="11" fill="#666">
      Server Status: Running
    </text>
    <text x="480" y="200" font-family="Arial, sans-serif" font-size="11" fill="#666">
      Total APIs: 41 endpoints
    </text>
    
    <!-- API Endpoints -->
    <rect x="470" y="230" width="260" height="280" rx="10" fill="#2D3436"/>
    <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      API Endpoints
    </text>
    
    <!-- Endpoint Categories -->
    <rect x="480" y="260" width="240" height="25" rx="3" fill="#6C5CE7"/>
    <text x="490" y="277" font-family="Arial, sans-serif" font-size="11" fill="white">
      🔐 Authentication: /api/auth/* (login, register, profile)
    </text>
    
    <rect x="480" y="290" width="240" height="25" rx="3" fill="#FDCB6E"/>
    <text x="490" y="307" font-family="Arial, sans-serif" font-size="11" fill="#333">
      🍺 Drinks: /api/drinks/* (log, statistics, history)
    </text>
    
    <rect x="480" y="320" width="240" height="25" rx="3" fill="#E17055"/>
    <text x="490" y="337" font-family="Arial, sans-serif" font-size="11" fill="white">
      😊 Mood: /api/mood/* (log, statistics, analysis)
    </text>
    
    <rect x="480" y="350" width="240" height="25" rx="3" fill="#A29BFE"/>
    <text x="490" y="367" font-family="Arial, sans-serif" font-size="11" fill="white">
      📊 Progress: /api/progress/* (weekly, monthly, dashboard)
    </text>
    
    <rect x="480" y="380" width="240" height="25" rx="3" fill="#FD79A8"/>
    <text x="490" y="397" font-family="Arial, sans-serif" font-size="11" fill="white">
      🎯 Tasks: /api/tasks/* (daily, complete, statistics)
    </text>
    
    <rect x="480" y="410" width="240" height="25" rx="3" fill="#74B9FF"/>
    <text x="490" y="427" font-family="Arial, sans-serif" font-size="11" fill="white">
      🎮 Gamification: /api/gamification/* (points, levels)
    </text>
    
    <rect x="480" y="440" width="240" height="25" rx="3" fill="#55A3FF"/>
    <text x="490" y="457" font-family="Arial, sans-serif" font-size="11" fill="white">
      🆘 SOS: /api/sos/* (contacts, emergency)
    </text>
    
    <rect x="480" y="470" width="240" height="25" rx="3" fill="#00CEC9"/>
    <text x="490" y="487" font-family="Arial, sans-serif" font-size="11" fill="white">
      ⚙️ Settings & Content: /api/settings/*, /api/content/*
    </text>
  </g>
  
  <!-- Database -->
  <rect x="520" y="530" width="160" height="40" rx="5" fill="#636E72"/>
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    📁 MySQL Database
  </text>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#DDD">
    Connected & Active
  </text>
  
  <!-- Data Flow Labels -->
  <text x="400" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
    Live Data Synchronization
  </text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00B894"/>
    </marker>
  </defs>
</svg>